<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111111" />
  <title>קטלוג | רהיטי ברגיג</title>
  <meta name="description" content="צפייה גדולה ונקייה בקטלוג של רהיטי ברגיג." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="reader-page">
  <div class="reader-top-hotspot" id="readerTopHotspot" aria-hidden="true">
    <span>⌄</span>
  </div>

  <div class="reader-top-shell" id="readerTopShell">
    <header class="reader-header">
      <a class="reader-home" href="index.html" aria-label="חזרה לדף הקטלוגים">
        <img class="reader-logo" data-brand-logo="1" data-wp-logo="1" alt="לוגו רהיטי ברגיג" />
        <span>רהיטי ברגיג</span>
      </a>

      <div class="reader-header-search" role="search" aria-labelledby="readerSearchTitle">
        <strong class="visually-hidden" id="readerSearchTitle">חיפוש בקטלוג הזה</strong>
        <label class="visually-hidden" for="readerSearchInput">חיפוש בקטלוג</label>
        <div class="reader-search-box">
          <input id="readerSearchInput" class="reader-search-input" type="search" autocomplete="off" placeholder="חפש בקטלוג הזה..." aria-describedby="readerSearchStatus" />
          <button class="reader-button reader-search-clear hidden" id="readerSearchClear" type="button">נקה</button>
        </div>
        <div class="reader-title-wrap visually-hidden" aria-live="polite">
          <span id="readerTitle">קטלוג</span>
          <span id="readerMeta"></span>
          <span id="readerSearchStatus">הקלד דגם או מילה מתוך העמודים.</span>
        </div>
      </div>

      <button class="reader-button" id="readerBack" type="button">חזרה</button>
    </header>

    <div class="reader-search-results hidden" id="readerSearchResults" aria-live="polite"></div>
  </div>

  <div class="reader-side-hotspot" id="readerSideHotspot" aria-hidden="true">
    <span>‹</span>
  </div>

  <aside class="reader-page-rail" id="readerPageRail" aria-label="מעבר מהיר בין עמודי הקטלוג">
    <div class="reader-page-rail-title">עמודים</div>
    <div class="reader-page-thumbs" id="readerPageThumbs"></div>
  </aside>

  <div class="reader-floating-preview" id="readerFloatingPreview" aria-hidden="true">
    <img id="readerFloatingPreviewImage" alt="" loading="lazy" />
    <span id="readerFloatingPreviewPage"></span>
  </div>

  <main class="reader-main" id="readerMain">
    <div class="reader-pages" id="readerPages"></div>
  </main>

  <script src="wp_logo_data.js"></script>
  <script src="brand-logo.js"></script>
  <script src="catalogs.generated.js"></script>
  <script src="catalogs.search.js"></script>
  <script src="catalog-search.js"></script>
  <script src="catalog-viewer.js"></script>
</body>
</html>
