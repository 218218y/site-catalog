name: Project verification

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PLAYWRIGHT_VISUAL_BASELINE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            tools/requirements.txt
            tools/requirements-dev.txt

      - name: Remove ephemeral source artifacts
        run: python tools/clean_project_artifacts.py

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: npm run setup:python

      - name: Install Playwright Chromium and OS dependencies
        run: npx --no-install playwright install --with-deps chromium

      - name: Run complete verification
        run: npm run verify

      - name: Verify tests left no source-tree caches
        run: python tools/clean_project_artifacts.py --check

      - name: Upload Playwright diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          if-no-files-found: ignore
          retention-days: 14
          path: |
            .artifacts/playwright-report/
            .artifacts/playwright-results/
