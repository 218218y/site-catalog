  <title>צפייה בכל תמונות הקטלוגים לפי גודל</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2ed;
      --panel: #fffaf4;
      --panel-strong: #ffffff;
      --text: #2d241d;
      --muted: #74665a;
      --border: #e2d5c9;
      --brand: #8b6f5a;
      --brand-dark: #654d3d;
      --shadow: 0 18px 45px rgba(52, 38, 26, .14);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans Hebrew", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(139, 111, 90, .16), transparent 34rem),
        linear-gradient(180deg, #fffdf9 0%, var(--bg) 42%, #eee4da 100%);
      color: var(--text);
    }

    a { color: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 250, 244, .94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 10px 28px rgba(52, 38, 26, .08);
    }

    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .title h1 {
      margin: 0 0 4px;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      line-height: 1.2;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    button, select, input {
      font: inherit;
    }

    .button {
      border: 0;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(101, 77, 61, .18);
      transition: transform .15s ease, filter .15s ease, opacity .15s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
    }

    .button:hover { transform: translateY(-1px); filter: brightness(.98); }
    .button:active { transform: translateY(0); }
    .button:disabled { opacity: .42; cursor: not-allowed; transform: none; }

    .button.secondary {
      background: #fff;
      color: var(--brand-dark);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .button.auto-active {
      background: var(--brand-dark);
      box-shadow: 0 8px 18px rgba(101, 77, 61, .24);
    }

    html.auto-scrolling {
      scroll-behavior: auto;
    }

    .auto-status {
      flex: 1 1 100%;
      min-height: 1.2em;
      color: var(--muted);
      font-size: .86rem;
      text-align: center;
    }

    .page-select {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      min-height: 40px;
      padding: 8px 12px;
      min-width: 185px;
    }

    .size-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 5px 4px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--brand-dark);
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(52, 38, 26, .07);
    }

    .size-control label {
      white-space: nowrap;
      padding-inline-start: 6px;
    }

    .size-control .page-select {
      min-width: 145px;
      border: 0;
      box-shadow: none;
      background: #f8f2ec;
      cursor: pointer;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 18px 54px;
    }

    .summary {
      margin: 0 0 22px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .68);
      box-shadow: var(--shadow);
    }

    .summary strong { color: var(--brand-dark); }
    .summary small { color: var(--muted); display: block; margin-top: 5px; }

    .catalog-separator {
      margin: 28px 0 14px;
      padding: 13px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(139, 111, 90, .14), rgba(255,255,255,.9));
      color: var(--brand-dark);
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(52, 38, 26, .08);
    }

    .image-list {
      display: grid;
      gap: 28px;
    }

    .page-card {
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--panel-strong);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .page-card-header {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: #fffaf4;
    }

    .page-title {
      font-weight: 800;
      line-height: 1.35;
    }

    .page-meta {
      color: var(--muted);
      font-size: .93rem;
    }

    .full-link {
      color: var(--brand-dark);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px dashed currentColor;
    }

    .image-wrap {
      background: #efe7de;
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .page-image {
      display: block;
      width: min(100%, 1180px);
      height: auto;
      background: #ddd4cc;
      border-radius: 12px;
    }

    .bottom-nav {
      margin: 36px 0 0;
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: rgba(255, 250, 244, .92);
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
      text-align: center;
    }

    .bottom-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .footer-note {
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.55;
    }

    .error {
      padding: 18px;
      border-radius: var(--radius);
      background: #fff1ef;
      border: 1px solid #efc4bc;
      color: #743225;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .topbar-inner {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: stretch;
      }

      .button, .page-select, .size-control {
        flex: 1 1 auto;
      }

      .size-control {
        justify-content: space-between;
      }

      main { padding-inline: 10px; }
      .page-card { border-radius: 16px; }
      .image-wrap { padding: 4px; }
      .page-image { border-radius: 9px; }
    }

    @media print {
      .topbar, .bottom-nav, .full-link { display: none !important; }
      body { background: #fff; }
      main { max-width: none; padding: 0; }
      .page-card { break-inside: avoid; box-shadow: none; border: 0; margin-bottom: 18px; }
      .image-wrap { padding: 0; background: #fff; }
    }
  </style>

  </script>
  <script>
    "use strict";

    const R2_ASSET_BASE_URL = "https://cdn.bargig-furniture.com/";
    const CONFIGURED_ASSET_BASE_URL = String(window.BARGIG_CATALOG_ASSET_BASE_URL || R2_ASSET_BASE_URL).trim();
    const BASE_URL = CONFIGURED_ASSET_BASE_URL.endsWith("/") ? CONFIGURED_ASSET_BASE_URL : CONFIGURED_ASSET_BASE_URL + "/";
    const IMAGES_PER_VIEW = 50;
    const AUTO_SCROLL_CHUNK_DURATION_MS = 4 * 60 * 1000;
    const AUTO_SCROLL_HEARTBEAT_MS = 1000;
    const INSPECTION_SESSION_PARAM = "viewer_session";
    const INSPECTION_SESSION_ID = `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    const IMAGE_TIERS = Object.freeze({
      thumb: Object.freeze({ key: "thumb", label: "קטנות", directory: "thumbs", maxSide: 420 }),
      medium: Object.freeze({ key: "medium", label: "בינוניות", directory: "medium", maxSide: 1600 }),
      full: Object.freeze({ key: "full", label: "גדולות", directory: "", maxSide: 2800 })
    });
    const TIER_ALIASES = Object.freeze({ small: "thumb", thumbnail: "thumb", large: "full" });
    const CATALOGS = Array.isArray(window.BARGIG_CATALOGS)
      ? window.BARGIG_CATALOGS.filter(catalog => catalog && typeof catalog === "object")
      : [];

    const pad = (num) => String(num).padStart(3, "0");
    const cleanPath = (value) => String(value || "").trim().replace(/^\/+|\/+$/g, "");
    const isAbsoluteUrl = (value) => /^[a-z][a-z0-9+.-]*:\/\//i.test(value) || value.startsWith("//") || value.startsWith("data:");

    function normalizeTier(value) {
      const requested = String(value || "").trim().toLowerCase();
      const normalized = TIER_ALIASES[requested] || requested;
      return Object.prototype.hasOwnProperty.call(IMAGE_TIERS, normalized) ? normalized : "full";
    }

    function tierDefinition(tier) {
      return IMAGE_TIERS[normalizeTier(tier)];
    }

    function catalogVariant(catalog, tier) {
      const normalized = normalizeTier(tier);
      const configured = catalog?.imageVariants?.[normalized];
      if (configured && typeof configured === "object") {
        return {
          directory: cleanPath(configured.directory || ""),
          maxSide: Number(configured.maxSide) || tierDefinition(normalized).maxSide
        };
      }
      const fallback = tierDefinition(normalized);
      return { directory: fallback.directory, maxSide: fallback.maxSide };
    }

    function resolveCatalogAssetUrl(path) {
      const clean = String(path || "").trim();
      if (!clean || isAbsoluteUrl(clean)) return clean;
      try {
        return new URL(cleanPath(clean), BASE_URL).href;
      } catch {
        return BASE_URL + cleanPath(clean);
      }
    }

    function withInspectionSession(url) {
      try {
        const parsed = new URL(url, BASE_URL);
        parsed.searchParams.set(INSPECTION_SESSION_PARAM, INSPECTION_SESSION_ID);
        return parsed.href;
      } catch {
        return url + (url.includes("?") ? "&" : "?")
          + INSPECTION_SESSION_PARAM + "=" + encodeURIComponent(INSPECTION_SESSION_ID);
      }
    }

    function imageOriginUrl(catalog, page, tier) {
      const dir = cleanPath(catalog.dir || ("assets/pages/" + catalog.id));
      const ext = cleanPath(catalog.imageExt || "webp") || "webp";
      const variant = catalogVariant(catalog, tier);
      const variantPath = variant.directory ? "/" + variant.directory : "";
      const relative = dir + variantPath + "/page-" + pad(page) + "." + ext;
      return resolveCatalogAssetUrl(relative);
    }

    function imageUrl(catalog, page, tier) {
      return withInspectionSession(imageOriginUrl(catalog, page, tier));
    }

    function imageDimensions(catalog, page, tier) {
      const raw = Array.isArray(catalog.pageSizes) ? catalog.pageSizes[page - 1] : null;
      const width = Array.isArray(raw) ? Number(raw[0]) : 0;
      const height = Array.isArray(raw) ? Number(raw[1]) : 0;
      if (!(width > 0 && height > 0)) return {};

      const maxSide = Number(catalogVariant(catalog, tier).maxSide) || Math.max(width, height);
      const scale = Math.min(1, maxSide / Math.max(width, height));
      return {
        width: Math.max(1, Math.round(width * scale)),
        height: Math.max(1, Math.round(height * scale))
      };
    }

    function buildImageIndex() {
      const items = [];
      CATALOGS.forEach((catalog, catalogIndex) => {
        const pages = Number(catalog.pages || 0);
        for (let page = 1; page <= pages; page++) {
          items.push({
            catalog,
            catalogIndex,
            page,
            globalIndex: items.length + 1
          });
        }
      });
      return items;
    }

    const allImages = buildImageIndex();
    const chunkCount = Math.max(1, Math.ceil(allImages.length / IMAGES_PER_VIEW));

    const els = {
      topStatus: document.getElementById("topStatus"),
      summary: document.getElementById("summary"),
      imageList: document.getElementById("imageList"),
      bottomStatus: document.getElementById("bottomStatus"),
      prevTop: document.getElementById("prevTop"),
      nextTop: document.getElementById("nextTop"),
      prevBottom: document.getElementById("prevBottom"),
      nextBottom: document.getElementById("nextBottom"),
      chunkSelect: document.getElementById("chunkSelect"),
      imageTierSelect: document.getElementById("imageTierSelect"),
      autoScrollTop: document.getElementById("autoScrollTop"),
      autoScrollStatus: document.getElementById("autoScrollStatus"),
      footerNote: document.getElementById("footerNote")
    };

    function stateFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const tier = normalizeTier(params.get("size") || params.get("tier") || "full");
      const fromParam = Number(params.get("page") || params.get("chunk") || 1);
      let chunk = Number.isFinite(fromParam) && fromParam >= 1 ? Math.floor(fromParam) : 1;
      if (!params.has("page") && !params.has("chunk")) {
        const fromHash = Number(String(window.location.hash || "").replace(/[^0-9]/g, ""));
        if (Number.isFinite(fromHash) && fromHash >= 1) chunk = Math.floor(fromHash);
      }
      return { tier, chunk: Math.min(chunkCount, Math.max(1, chunk)) };
    }

    const initialState = stateFromUrl();
    let currentTier = initialState.tier;
    let currentChunk = initialState.chunk;
    let eagerImageRequests = [];
    let eagerPreloadLinks = [];
    let autoScrollFrame = null;
    let autoScrollTimer = null;
    let autoScrollToken = 0;
    const autoScrollState = {
      running: false,
      chunkStartedAt: 0,
      lastStatusSecond: -1
    };

    function visibleItem(item) {
      const dimensions = imageDimensions(item.catalog, item.page, currentTier);
      return {
        ...item,
        ...dimensions,
        url: imageUrl(item.catalog, item.page, currentTier),
        originUrl: imageOriginUrl(item.catalog, item.page, currentTier)
      };
    }

    function clearImmediateImageRequests() {
      eagerImageRequests = [];
      eagerPreloadLinks.forEach(link => link.remove());
      eagerPreloadLinks = [];
    }

    function requestChunkImagesImmediately(items) {
      clearImmediateImageRequests();

      items.forEach(item => {
        const preload = document.createElement("link");
        preload.rel = "preload";
        preload.as = "image";
        preload.href = item.url;
        document.head.appendChild(preload);
        eagerPreloadLinks.push(preload);

        const imageRequest = new Image();
        imageRequest.decoding = "async";
        if (item.width) imageRequest.width = item.width;
        if (item.height) imageRequest.height = item.height;
        imageRequest.src = item.url;
        eagerImageRequests.push(imageRequest);
      });
    }

    function setUrlState() {
      try {
        const url = new URL(window.location.href);
        url.searchParams.set("size", currentTier);
        url.searchParams.set("page", String(currentChunk));
        url.searchParams.delete("tier");
        url.searchParams.delete("chunk");
        url.hash = "top";
        window.history.replaceState(null, "", url);
      } catch {
        // Some browsers restrict history updates for file:// pages. The viewer itself still works normally.
      }
    }

    function formatAutoScrollTime(ms) {
      const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function getMaxScrollTop() {
      const doc = document.documentElement;
      const body = document.body;
      const fullHeight = Math.max(
        doc.scrollHeight,
        body.scrollHeight,
        doc.offsetHeight,
        body.offsetHeight,
        doc.clientHeight
      );
      return Math.max(0, fullHeight - window.innerHeight);
    }

    function updateAutoScrollControls(message = "") {
      const canRun = allImages.length > 0;
      els.autoScrollTop.disabled = !canRun;
      els.autoScrollTop.classList.toggle("auto-active", autoScrollState.running);
      els.autoScrollTop.setAttribute("aria-pressed", autoScrollState.running ? "true" : "false");
      els.autoScrollTop.textContent = autoScrollState.running ? "עצור גלילה אוטומטית" : "גלילה אוטומטית";
      els.autoScrollStatus.textContent = message;
      document.documentElement.classList.toggle("auto-scrolling", autoScrollState.running);
    }

    function cancelAutoScrollFrame() {
      if (autoScrollFrame !== null) {
        window.cancelAnimationFrame(autoScrollFrame);
        autoScrollFrame = null;
      }
    }

    function cancelAutoScrollTimer() {
      if (autoScrollTimer !== null) {
        window.clearTimeout(autoScrollTimer);
        autoScrollTimer = null;
      }
    }

    function cancelAutoScrollTimers() {
      cancelAutoScrollFrame();
      cancelAutoScrollTimer();
    }

    function nowMs() {
      return Date.now();
    }

    function getAutoScrollElapsed() {
      return Math.max(0, nowMs() - autoScrollState.chunkStartedAt);
    }

    function setAutoScrollStatusByProgress(elapsed) {
      const elapsedSecond = Math.floor(elapsed / 1000);
      if (elapsedSecond === autoScrollState.lastStatusSecond) return;
      autoScrollState.lastStatusSecond = elapsedSecond;
      const remaining = Math.max(0, AUTO_SCROLL_CHUNK_DURATION_MS - elapsed);
      updateAutoScrollControls(
        `גלילה אוטומטית פעילה · תמונות ${tierDefinition(currentTier).label} · קבוצה ${currentChunk} מתוך ${chunkCount} · נותרו בערך ${formatAutoScrollTime(remaining)}`
      );
    }

    function stopAutoScroll(message = "") {
      autoScrollToken += 1;
      cancelAutoScrollTimers();
      autoScrollState.running = false;
      autoScrollState.chunkStartedAt = 0;
      autoScrollState.lastStatusSecond = -1;
      updateAutoScrollControls(message);
    }

    function syncAutoScrollToClock() {
      if (!autoScrollState.running) return false;

      let elapsed = getAutoScrollElapsed();
      while (elapsed >= AUTO_SCROLL_CHUNK_DURATION_MS) {
        if (currentChunk >= chunkCount) {
          window.scrollTo({ top: getMaxScrollTop(), behavior: "auto" });
          stopAutoScroll("הגלילה האוטומטית הסתיימה — הגעת לסוף כל התמונות בגודל שנבחר.");
          return false;
        }

        setChunk(currentChunk + 1, false);
        autoScrollState.chunkStartedAt += AUTO_SCROLL_CHUNK_DURATION_MS;
        autoScrollState.lastStatusSecond = -1;
        elapsed = getAutoScrollElapsed();
      }

      return true;
    }

    function paintAutoScrollProgress() {
      const elapsed = getAutoScrollElapsed();
      const progress = Math.min(1, elapsed / AUTO_SCROLL_CHUNK_DURATION_MS);
      const targetTop = Math.round(getMaxScrollTop() * progress);

      window.scrollTo({ top: targetTop, behavior: "auto" });
      setAutoScrollStatusByProgress(elapsed);
    }

    function stepAutoScrollFrame(token) {
      if (!autoScrollState.running || token !== autoScrollToken) return;
      if (!syncAutoScrollToClock()) return;
      if (!document.hidden) paintAutoScrollProgress();
      autoScrollFrame = window.requestAnimationFrame(() => stepAutoScrollFrame(token));
    }

    function stepAutoScrollHeartbeat(token) {
      if (!autoScrollState.running || token !== autoScrollToken) return;
      if (!syncAutoScrollToClock()) return;
      paintAutoScrollProgress();
      autoScrollTimer = window.setTimeout(() => stepAutoScrollHeartbeat(token), AUTO_SCROLL_HEARTBEAT_MS);
    }

    function beginAutoScrollChunk(keepClock = false) {
      cancelAutoScrollTimers();
      autoScrollToken += 1;
      const token = autoScrollToken;
      if (!keepClock) autoScrollState.chunkStartedAt = nowMs();
      autoScrollState.lastStatusSecond = -1;
      updateAutoScrollControls(`מתחיל גלילה אוטומטית בקבוצה ${currentChunk} מתוך ${chunkCount}…`);
      paintAutoScrollProgress();
      autoScrollFrame = window.requestAnimationFrame(() => stepAutoScrollFrame(token));
      autoScrollTimer = window.setTimeout(() => stepAutoScrollHeartbeat(token), AUTO_SCROLL_HEARTBEAT_MS);
    }

    function startAutoScroll() {
      if (!allImages.length || autoScrollState.running) return;
      autoScrollState.running = true;
      updateAutoScrollControls();
      beginAutoScrollChunk();
    }

    function toggleAutoScroll() {
      if (autoScrollState.running) {
        stopAutoScroll("הגלילה האוטומטית נעצרה.");
        return;
      }
      startAutoScroll();
    }

    function stopAutoScrollForUserNavigation() {
      if (autoScrollState.running) stopAutoScroll("הגלילה האוטומטית נעצרה בגלל ניווט ידני.");
    }

    function setChunkFromUser(chunk) {
      stopAutoScrollForUserNavigation();
      setChunk(chunk);
    }

    function setChunk(chunk, shouldScroll = true) {
      currentChunk = Math.min(chunkCount, Math.max(1, Number(chunk) || 1));
      setUrlState();
      render();
      if (shouldScroll) window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setImageTierFromUser(tier) {
      const nextTier = normalizeTier(tier);
      if (nextTier === currentTier) return;
      stopAutoScrollForUserNavigation();
      currentTier = nextTier;
      setUrlState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function fillSelect() {
      els.chunkSelect.innerHTML = "";
      if (!allImages.length) {
        const option = document.createElement("option");
        option.value = "1";
        option.textContent = "לא נמצאו תמונות";
        els.chunkSelect.appendChild(option);
        els.chunkSelect.disabled = true;
        return;
      }
      els.chunkSelect.disabled = false;
      for (let i = 1; i <= chunkCount; i++) {
        const start = (i - 1) * IMAGES_PER_VIEW + 1;
        const end = Math.min(i * IMAGES_PER_VIEW, allImages.length);
        const option = document.createElement("option");
        option.value = String(i);
        option.textContent = `קבוצה ${i} מתוך ${chunkCount} — תמונות ${start}–${end}`;
        els.chunkSelect.appendChild(option);
      }
    }

    function createSeparator(title, category) {
      const div = document.createElement("div");
      div.className = "catalog-separator";
      div.textContent = category ? `${title} · ${category}` : title;
      return div;
    }

    function createCard(item) {
      const tier = tierDefinition(currentTier);
      const article = document.createElement("article");
      article.className = "page-card";

      const header = document.createElement("header");
      header.className = "page-card-header";

      const title = document.createElement("div");
      title.className = "page-title";
      title.textContent = `${item.catalog.title} — עמוד ${item.page}`;

      const meta = document.createElement("div");
      meta.className = "page-meta";
      meta.textContent = `תמונה ${item.globalIndex} מתוך ${allImages.length} · ${tier.label}`;

      const link = document.createElement("a");
      link.className = "full-link";
      link.href = item.url;
      link.target = "_blank";
      link.rel = "noopener";
      link.textContent = `פתח תמונה ${tier.label}`;

      header.append(title, meta, link);

      const wrap = document.createElement("div");
      wrap.className = "image-wrap";

      const img = document.createElement("img");
      img.className = "page-image";
      img.src = item.url;
      img.alt = `${item.catalog.title} - עמוד ${item.page} - תמונה ${tier.label}`;
      img.loading = "eager";
      img.fetchPriority = "high";
      img.decoding = "async";
      if (item.width) img.width = item.width;
      if (item.height) img.height = item.height;
      let attemptedOriginFallback = false;
      img.addEventListener("error", () => {
        if (!attemptedOriginFallback && item.originUrl && item.originUrl !== img.src) {
          attemptedOriginFallback = true;
          link.href = item.originUrl;
          img.src = item.originUrl;
          return;
        }
        img.removeAttribute("src");
        img.alt = "לא הצלחתי לטעון את התמונה: " + item.originUrl;
        img.style.minHeight = "220px";
        img.style.padding = "28px";
        img.style.objectFit = "contain";
        img.style.background = "#fff1ef";
      });

      wrap.appendChild(img);
      article.append(header, wrap);
      return article;
    }

    function setSummary(strongText, smallText) {
      els.summary.replaceChildren();
      const strong = document.createElement("strong");
      strong.textContent = strongText;
      const small = document.createElement("small");
      small.textContent = smallText;
      els.summary.append(strong, small);
    }

    function render() {
      const tier = tierDefinition(currentTier);
      const startIndex = (currentChunk - 1) * IMAGES_PER_VIEW;
      const visible = allImages.slice(startIndex, startIndex + IMAGES_PER_VIEW).map(visibleItem);
      const endIndex = startIndex + visible.length;

      requestChunkImagesImmediately(visible);

      els.imageTierSelect.value = currentTier;
      els.chunkSelect.value = String(currentChunk);
      const hasPrev = currentChunk > 1;
      const hasNext = currentChunk < chunkCount;
      [els.prevTop, els.prevBottom].forEach(btn => btn.disabled = !hasPrev);
      [els.nextTop, els.nextBottom].forEach(btn => btn.disabled = !hasNext);
      updateAutoScrollControls(els.autoScrollStatus.textContent);

      els.imageList.replaceChildren();
      if (!allImages.length) {
        els.topStatus.textContent = "לא נמצאה רשימת קטלוגים מעודכנת";
        setSummary(
          "לא נמצאו תמונות להצגה.",
          "רשימת הקטלוגים אמורה להיות צרובה בתוך קובץ ה־HTML העצמאי. הרץ את tools/build_big_pages_viewer.py כדי לסנכרן אותה."
        );
        els.bottomStatus.textContent = "אין קבוצה נוספת להצגה.";
        const error = document.createElement("div");
        error.className = "error";
        error.textContent = "לא הצלחתי לטעון את רשימת הקטלוגים הצרובה בקובץ.";
        els.imageList.appendChild(error);
        return;
      }

      els.topStatus.textContent = `${allImages.length} תמונות ${tier.label} · מציג ${startIndex + 1}–${endIndex} · קבוצה ${currentChunk} מתוך ${chunkCount}`;
      setSummary(
        `מציג עכשיו תמונות ${tier.label} ${startIndex + 1}–${endIndex} מתוך ${allImages.length}`,
        `הסדר הוא לפי סדר הקטלוגים באתר ובכל קטלוג לפי page-001, page-002 וכן הלאה. כל ${visible.length} התמונות בקבוצה נשלחות לטעינה מיידית מ־Cloudflare R2. מעבר לקבוצה הבאה ממשיך עם תמונות ${tier.label}.`
      );
      els.bottomStatus.textContent = hasNext
        ? `סיימת את ${visible.length} התמונות ${tier.label}? אפשר לעבור לקבוצה ${currentChunk + 1} מתוך ${chunkCount}.`
        : `זהו, הגעת לסוף כל התמונות ${tier.label} של הקטלוגים.`;
      els.footerNote.innerHTML =
        `הדף הזה עצמאי: רשימת הקטלוגים המעודכנת צרובה בתוך הקובץ עצמו.<br>` +
        `התמונות ${tier.label} נטענות ישירות מ־Cloudflare R2/CDN: <strong>${BASE_URL}assets/pages/</strong>`;

      let lastCatalogId = null;
      visible.forEach(item => {
        if (item.catalog.id !== lastCatalogId) {
          els.imageList.appendChild(createSeparator(item.catalog.title, item.catalog.category));
          lastCatalogId = item.catalog.id;
        }
        els.imageList.appendChild(createCard(item));
      });
    }

    fillSelect();
    els.autoScrollTop.addEventListener("click", toggleAutoScroll);
    els.prevTop.addEventListener("click", () => setChunkFromUser(currentChunk - 1));
    els.prevBottom.addEventListener("click", () => setChunkFromUser(currentChunk - 1));
    els.nextTop.addEventListener("click", () => setChunkFromUser(currentChunk + 1));
    els.nextBottom.addEventListener("click", () => setChunkFromUser(currentChunk + 1));
    els.chunkSelect.addEventListener("change", () => setChunkFromUser(Number(els.chunkSelect.value)));
    els.imageTierSelect.addEventListener("change", () => setImageTierFromUser(els.imageTierSelect.value));
    window.addEventListener("popstate", () => {
      stopAutoScrollForUserNavigation();
      const next = stateFromUrl();
      currentTier = next.tier;
      currentChunk = next.chunk;
      render();
    });
    window.addEventListener("keydown", (event) => {
      if (!autoScrollState.running) return;
      const keysThatUsuallyScroll = new Set(["ArrowDown", "ArrowUp", "PageDown", "PageUp", "Home", "End", " "]);
      if (keysThatUsuallyScroll.has(event.key)) stopAutoScroll("הגלילה האוטומטית נעצרה בגלל גלילה ידנית.");
    });
    window.addEventListener("wheel", () => {
      if (autoScrollState.running) stopAutoScroll("הגלילה האוטומטית נעצרה בגלל גלילה ידנית.");
    }, { passive: true });
    window.addEventListener("touchstart", () => {
      if (autoScrollState.running) stopAutoScroll("הגלילה האוטומטית נעצרה בגלל גלילה ידנית.");
    }, { passive: true });
    document.addEventListener("visibilitychange", () => {
      if (!autoScrollState.running || document.hidden) return;
      if (!syncAutoScrollToClock()) return;
      beginAutoScrollChunk(true);
    });
    setUrlState();
    render();
  </script>
